<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <title>Multiple Modals</title>
</head>
<body>
    <div class="card-container">
        <div class="card" data-description="Alice is neat!">
            <img src="https://picsum.photos/200?random=1" alt="">
            <h2 class="lato-large">Alice</h2>
            <button class="lato-small">Learn more →</button>
        </div>
        <div class="card" data-description="Bob is cool!">
            <img src="https://picsum.photos/200?random=2" alt="">
            <h2 class="lato-large">Bob</h2>
            <button class="lato-small">Learn more →</button>
        </div>
        <div class="card" data-description="Jack is fun!">
            <img src="https://picsum.photos/200?random=3" alt="">
            <h2 class="lato-large">Jack</h2>
            <button class="lato-small">Learn more →</button>
        </div>
        <div class="card" data-description="Jill is wild!">
            <img src="https://picsum.photos/200?random=4" alt="">
            <h2 class="lato-large">Jill</h2>
            <button class="lato-small">Learn more →</button>
        </div>
    </div>

    <div class="modal-container">
        <dialog class="modal">
            
        </dialog>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
